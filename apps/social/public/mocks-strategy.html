function Bool({ v }) {

function PersonaCard({ p, idx }) {
  const [showResearch, setShowResearch] = useState(false);
  const labelStyle = { color: "#64748b", fontSize: "9px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "3px" };
  const cellStyle = { background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.08)", borderRadius: "6px", padding: "8px" };
  return (
    <div key={idx} style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.15)", borderRadius: "10px", padding: "16px" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
        <div style={{ background: "rgba(99,102,241,0.15)", borderRadius: "8px", padding: "8px", display: "flex", alignItems: "center", justifyContent: "center" }}>{p.icon}</div>
        <div style={{ flex: 1 }}>
          <div style={{ color: "white", fontWeight: 700, fontSize: "14px" }}>{p.name}</div>
          <div style={{ color: "#94a3b8", fontSize: "11px" }}>{p.subtitle}</div>
        </div>
        {p.kpi && <span style={{ background: "rgba(16,185,129,0.1)", border: "1px solid rgba(16,185,129,0.2)", color: "#6ee7b7", padding: "3px 8px", borderRadius: "9999px", fontSize: "9px", fontWeight: 600 }}>KPI: {p.kpi}</span>}
      </div>

      {/* Pain + Job — always visible */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" }}>
        <div style={cellStyle}>
          <div style={labelStyle}>Pain</div>
          <div style={{ color: "#fca5a5", fontSize: "11px", lineHeight: 1.45 }}>{p.pain}</div>
        </div>
        <div style={cellStyle}>
          <div style={labelStyle}>Job to Be Done</div>
          <div style={{ color: "#a5b4fc", fontSize: "11px", lineHeight: 1.45 }}>{p.job}</div>
        </div>
      </div>

      {/* Decision Maker */}
      {p.decisionMaker && (
        <div style={{ ...cellStyle, marginBottom: "10px" }}>
          <div style={labelStyle}>Decision Maker</div>
          <div style={{ color: "#cbd5e1", fontSize: "11px" }}>{p.decisionMaker}</div>
        </div>
      )}

      {/* Needs — pill chips */}
      <div style={{ marginBottom: "10px" }}>
        <div style={{ ...labelStyle, marginBottom: "6px" }}>Needs</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
          {p.needs.map((n, i) => (
            <span key={i} style={{ background: "rgba(99,102,241,0.1)", border: "1px solid rgba(99,102,241,0.15)", padding: "3px 8px", borderRadius: "9999px", color: "#c7d2fe", fontSize: "10px" }}>{n}</span>
          ))}
        </div>
      </div>

      {/* Objections — if present */}
      {p.objections && (
        <div style={{ marginBottom: "10px" }}>
          <div style={{ ...labelStyle, marginBottom: "6px" }}>Objections & Counters</div>
          <div style={{ display: "grid", gap: "4px" }}>
            {p.objections.map((o, i) => (
              <div key={i} style={{ ...cellStyle, padding: "6px 8px", fontSize: "10px", color: "#94a3b8", lineHeight: 1.4 }}>{o}</div>
            ))}
          </div>
        </div>
      )}

      {/* Pipeline + TAM + Language — inline grid */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" }}>
        <div style={cellStyle}>
          <div style={labelStyle}>Pipeline</div>
          <div style={{ color: "#cbd5e1", fontSize: "10px", lineHeight: 1.4 }}>{p.pipeline}</div>
        </div>
        <div style={cellStyle}>
          <div style={labelStyle}>TAM</div>
          <div style={{ color: "#cbd5e1", fontSize: "10px", lineHeight: 1.4 }}>{p.tam}</div>
        </div>
      </div>

      {/* Language chips */}
      {p.language && (
        <div style={{ marginBottom: "10px" }}>
          <div style={{ ...labelStyle, marginBottom: "6px" }}>Copy Language</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
            {p.language.map((l, i) => (
              <span key={i} style={{ background: "rgba(168,85,247,0.1)", border: "1px solid rgba(168,85,247,0.2)", padding: "2px 7px", borderRadius: "9999px", color: "#d8b4fe", fontSize: "9px", fontStyle: "italic" }}>{l}</span>
            ))}
          </div>
        </div>
      )}

      {/* Website Needs */}
      {p.websiteNeeds && (
        <div style={{ ...cellStyle, marginBottom: "10px" }}>
          <div style={labelStyle}>Website Needs</div>
          <div style={{ color: "#cbd5e1", fontSize: "10px", lineHeight: 1.4 }}>{p.websiteNeeds}</div>
        </div>
      )}

      {/* Research — collapsible */}
      {p.research && (
        <div style={{ borderTop: "1px solid rgba(99,102,241,0.1)", paddingTop: "10px" }}>
          <div onClick={(e) => { e.stopPropagation(); setShowResearch(!showResearch); }} style={{ display: "flex", alignItems: "center", gap: "6px", cursor: "pointer", userSelect: "none" }}>
            <ChevronRight size={12} color="#818cf8" className={showResearch ? "" : ""} style={{ transform: showResearch ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s" }} />
            <span style={{ color: "#818cf8", fontSize: "10px", fontWeight: 600 }}>Market Research ({p.research.length} data points)</span>
          </div>
          {showResearch && (
            <div style={{ marginTop: "8px", display: "grid", gap: "4px" }}>
              {p.research.map((r, i) => (
                <div key={i} style={{ background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.06)", borderRadius: "4px", padding: "6px 8px", fontSize: "10px", color: "#94a3b8", lineHeight: 1.4 }}>{r}</div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

      </div>

      {/* Main Tabs */}
      <div style={{ display: "flex", gap: "8px", marginBottom: "20px", borderBottom: "1px solid rgba(99,102,241,0.1)", paddingBottom: "12px", flexWrap: "wrap" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? "rgba(99,102,241,0.2)" : "transparent", border: `1px solid ${tab === t.id ? "rgba(99,102,241,0.4)" : "rgba(99,102,241,0.1)"}`, color: tab === t.id ? "white" : "#94a3b8", padding: "8px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "12px", fontWeight: tab === t.id ? 600 : 400 }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* PERSONAS */}
      {tab === "personas" && (
        <div className="space-y-6">
          {personas.map((tier, tidx) => (
            <div key={tidx}>
              <div style={{ color: tier.color, fontWeight: 600, fontSize: "13px", marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.5px" }}>
                {tier.tier}
              </div>
              <div style={{ color: "#94a3b8", fontSize: "11px", marginBottom: "12px" }}>{tier.desc}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(480px, 1fr))", gap: "16px" }}>
                {tier.personas.map((p, pidx) => (
                  <PersonaCard key={pidx} p={p} idx={pidx} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* VALUE PROPS */}
      {tab === "valueprops" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "16px" }}>
          {valueProps.map((vp, idx) => (
            <div key={idx} style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.15)", borderRadius: "8px", padding: "16px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
                {vp.icon}
                <div>
                  <div style={{ color: "white", fontWeight: 600, fontSize: "13px" }}>{vp.title}</div>
                  <div style={{ color: "#818cf8", fontSize: "11px" }}>{vp.short}</div>
                </div>
              </div>
              <p style={{ color: "#cbd5e1", fontSize: "11px", lineHeight: 1.5, marginBottom: "8px" }}>{vp.desc}</p>
              <div style={{ background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.15)", borderRadius: "6px", padding: "8px", fontSize: "10px", color: "#fca5a5" }}>
                <strong>vs. Competitors:</strong> {vp.vs}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* COMPETITIVE */}
      {tab === "competitive" && (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: "11px", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid rgba(99,102,241,0.15)" }}>
                {["Product","Issuer","AUM","Yield","Registration","Chains","Competitive Edge"].map(h => (
                  <th key={h} style={{ color: "#a5b4fc", fontWeight: 600, padding: "8px", textAlign: "left" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {competitiveData.map((row, idx) => (
                <tr key={idx} style={{ borderBottom: "1px solid rgba(99,102,241,0.08)", background: row.name === "YLDS" ? "rgba(99,102,241,0.08)" : "transparent" }}>
                  <td style={{ padding: "8px", color: row.name === "YLDS" ? "#a5b4fc" : "#cbd5e1", fontWeight: row.name === "YLDS" ? 600 : 400 }}>{row.name}</td>
                  <td style={{ padding: "8px", color: "#94a3b8" }}>{row.issuer}</td>
                  <td style={{ padding: "8px", color: "#94a3b8" }}>{row.aum}</td>
                  <td style={{ padding: "8px", color: row.yield === "0%" ? "#ef4444" : "#10b981", fontWeight: 600 }}>{row.yield}</td>
                  <td style={{ padding: "8px", color: "#94a3b8" }}>{row.reg}</td>
                  <td style={{ padding: "8px", color: "#94a3b8" }}>{row.chains}</td>
                  <td style={{ padding: "8px", color: "#94a3b8" }}>{row.edge}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* REGULATORY */}
      {tab === "regulatory" && (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: "10px", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "1px solid rgba(99,102,241,0.15)" }}>
                {["Product","Type","Yield","GENIUS","CLARITY","P2P","Multi-Chain"].map(h => (
                  <th key={h} style={{ color: "#a5b4fc", fontWeight: 600, padding: "8px", textAlign: "left" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {regData.map((row, idx) => (
                <tr key={idx} style={{ borderBottom: "1px solid rgba(99,102,241,0.08)", background: row.hl ? "rgba(99,102,241,0.08)" : "transparent" }}>
                  <td style={{ padding: "8px", color: row.hl ? "#a5b4fc" : "#cbd5e1", fontWeight: row.hl ? 600 : 400 }}>{row.product}</td>
                  <td style={{ padding: "8px", color: "#94a3b8", fontSize: "9px" }}>{row.type}</td>
                  <td style={{ padding: "8px", color: "#94a3b8", fontWeight: 600 }}>{row.yield}</td>
                  <td style={{ padding: "8px" }}><Badge impact={row.genius === "exempt" ? "exempt" : row.genius === "restricted" ? "restricted" : "gray"} /></td>
                  <td style={{ padding: "8px" }}><Badge impact={row.clarity === "exempt" ? "exempt" : row.clarity === "restricted" ? "restricted" : row.clarity === "at_risk" ? "at_risk" : "gray"} /></td>
                  <td style={{ padding: "8px" }}><Bool v={row.p2p} /></td>
                  <td style={{ padding: "8px" }}><Bool v={row.multi} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* CLIENTS */}
      {tab === "clients" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: "16px" }}>
          {clientCats.map((cat, idx) => (
            <div key={idx} style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.15)", borderRadius: "8px", padding: "16px" }}>
              <div style={{ color: cat.c, fontWeight: 600, fontSize: "12px", marginBottom: "12px" }}>{cat.cat}</div>
              <ul style={{ margin: 0, paddingLeft: "16px", color: "#cbd5e1", fontSize: "11px", lineHeight: 1.6 }}>
                {cat.list.map((item, i) => <li key={i}>{item}</li>)}
              </ul>
            </div>
          ))}
        </div>
      )}

      {/* SITEMAP */}
      {tab === "sitemap" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "16px" }}>
          {sitePages.map((p, idx) => (
            <div key={idx} style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.15)", borderRadius: "8px", padding: "16px" }}>
              <div style={{ color: "#a5b4fc", fontWeight: 600, fontSize: "12px", marginBottom: "4px" }}>{p.page}</div>
              <div style={{ color: "#64748b", fontSize: "10px", marginBottom: "8px" }}>{p.url}</div>
              <p style={{ color: "#cbd5e1", fontSize: "11px", marginBottom: "12px" }}>{p.purpose}</p>
              <div style={{ fontSize: "10px", color: "#94a3b8" }}>
                <strong style={{ color: "#a5b4fc" }}>Sections:</strong><br />
                {p.sections.join(" · ")}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* WIREFRAMES */}
      {tab === "wireframes" && (
        <div>
          <div style={{ display: "flex", gap: "8px", marginBottom: "20px", borderBottom: "1px solid rgba(99,102,241,0.1)", paddingBottom: "12px", flexWrap: "wrap" }}>
            {wireframeTabs.map(wt => (
              <button key={wt.id} onClick={() => setWireframeTab(wt.id)} style={{ background: wireframeTab === wt.id ? "rgba(99,102,241,0.2)" : "transparent", border: `1px solid ${wireframeTab === wt.id ? "rgba(99,102,241,0.4)" : "rgba(99,102,241,0.1)"}`, color: wireframeTab === wt.id ? "white" : "#94a3b8", padding: "8px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "12px", fontWeight: wireframeTab === wt.id ? 600 : 400 }}>
                {wt.label}
              </button>
            ))}
          </div>
          {wireframeTab === "homepage" && <HomepageWireframe />}
          {wireframeTab === "save" && <SaveWireframe />}
          {wireframeTab === "pay" && <PaySpendWireframe />}
          {wireframeTab === "regulatory" && <RegulatoryWireframe />}
          {wireframeTab === "about" && <AboutWireframe />}
          {wireframeTab === "contact" && <ContactWireframe />}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
