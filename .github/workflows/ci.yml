name: CI — Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/social/node_modules
          key: ${{ runner.os }}-node-modules-social-${{ hashFiles('apps/social/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-social-

      - name: Install dependencies
        run: cd apps/social && npm ci

      - name: Validate Prisma schema
        run: cd apps/social && npx prisma validate

      - name: Build
        run: cd apps/social && npm run build
